name: CI

'on':
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-build-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

      - name: Generate local dataset
        run: python data/generators/seed.py --stores 8 --skus 120 --days 21 --seed 42

      - name: Build dbt warehouse and tests
        env:
          PERISHABLES_DATA_DIR: ${{ github.workspace }}/data/generated
        run: dbt build --project-dir warehouse/dbt --profiles-dir warehouse/dbt

      - name: Validate Great Expectations suites
        run: |
          python -m json.tool quality/great_expectations/expectations/inventory_snapshot_suite.json >/dev/null
          python -m json.tool quality/great_expectations/expectations/perishables_risk_suite.json >/dev/null
